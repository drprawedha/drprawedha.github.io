<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onity - Doorlock </title>
</head>
<body>
    <button id="css-toggle" onclick="toggleCSS()">CSS: ON</button>

    <div class="wrap">
    <section>
        <h2>Preambule</h2>
        <p>Doorlock hotel menggunakan onity doorlock system</p>
    </section>

    <section>
        <h2>Parts</h2>
        <p>Untuk part doorlock dapat dilihat 
            <a href="https://onitylockparts.com/products/onity-ht24-complete-lockset?variant=48620127650079">disini</a></p>
    </section>
    <script>
    let cssOn = true;
    const link = document.getElementById('main-style');
    const btn = document.getElementById('css-toggle');

    function toggleCSS() {
        cssOn = !cssOn;
        link.disabled = !cssOn;
        btn.textContent = cssOn ? 'CSS: ON' : 'CSS: OFF';
        btn.style.cssText = cssOn
        ? ''
        : 'position:fixed;top:10px;right:10px;z-index:999;cursor:pointer;font-family:monospace;font-size:12px;';
    }
    </script>
    </div>
</body>
</html>
